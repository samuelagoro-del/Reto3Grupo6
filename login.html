<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flame Beat</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body id="PaginaLogin">

    <div id="loginOverlay" class="glass-card">

        <div class="logo">
            <img src="img/Logo.png" alt="Logo">
        </div>

        <h1>FLAME BEAT</h1>

        <div class="input-container">

            <div class="input-box">
                <img src="img/IconoUsuario.png" class="icon" style="width: 25px; margin-left: 5px;">
                <input type="text" id="usuario" placeholder="Usuario">
            </div>

            <div class="input-box">
                <img src="img/IconoContrasenia.png" class="icon" style="margin-left: 8px;">
                <input type="password" id="password" placeholder="Contraseña">
            </div>

        </div>

        <button id="entrar">ENTRAR</button>

        <p id="mensaje"></p>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
